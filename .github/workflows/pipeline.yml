name: Revenge Pipeline

on:
  schedule:
    # Mon/Wed/Fri 06:00 UTC — render+upload day-of; video is SCHEDULED by the
    # uploader for the next Tue/Thu/Sat 3 PM ET slot, so render time never
    # affects publish time.
    - cron: "0 6 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (stop before upload)"
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Kokoro TTS model (~340MB)
        uses: actions/cache@v4
        with:
          path: ~/.cache/revenge-tts
          key: kokoro-v1.0

      - name: Restore YouTube credentials
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d > youtube_client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scheduler.py ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Commit story queue state back
        if: always()
        run: |
          git config user.name "revenge-pipeline-bot"
          git config user.email "bot@users.noreply.github.com"
          git add stories.json output/scripts output/metadata || true
          git diff --cached --quiet || git commit -m "pipeline: update story state [skip ci]"
          git push || true
