name: Revenge Pipeline

on:
  schedule:
    # 3x/day, 8h apart (2026-07-14, RealDadRevenge-cadence experiment: user
    # wants 3 videos/day). Repo is public, GH Actions minutes are unlimited.
    # Render time never affects publish time, upload_agent schedules each
    # video into the next open ET slot (agents/upload_agent.py
    # PUBLISH_SLOTS_ET), independent of when its own render finished, so
    # these 3 triggers don't need to line up with the 10:30/16:00/20:00 ET
    # publish slots, just be spaced enough apart to avoid 3 renders
    # overlapping. Revert to a single "0 6 * * *" if the experiment ends.
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (stop before upload)"
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub's hard per-job ceiling for hosted runners; 2hr-target videos are untested at scale, this is the max runway available
    # Default GITHUB_TOKEN is read-only, state commit-back needs write
    # (403 "Write access not granted" bit both first runs, 2026-07-03/04).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        # Needed up-front, not just in the final commit-back step: status_manager.py
        # commits status.json mid-run (after every stage), and every one of those
        # commits was silently failing all along for lack of git identity, so the
        # dashboard never showed live progress (root-caused 2026-07-05).
        run: |
          git config user.name "revenge-pipeline-bot"
          git config user.email "bot@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg (with libass) + emoji font (thumbnail award row)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright chromium (thumbnail HTML/CSS renderer)
        run: playwright install --with-deps chromium

      - name: Cache Kokoro TTS, rembg, and faster-whisper models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/revenge-tts
            ~/.u2net
            ~/.cache/huggingface
          key: models-kokoro-v1.0-u2net-human-seg-whisper-base-en

      - name: Determine next pending story id (for audio cache key below)
        id: nextstory
        run: |
          id=$(python3 -c "import json; d=json.load(open('stories.json')); print(next((s['id'] for s in d['stories'] if s['status']=='pending'), 'none'))")
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Cache Kokoro-synthesized narration for the current story
        # GitHub Actions runners are ephemeral and output/audio/ is
        # gitignored (too large for git), so every dry-run re-test of the
        # same still-pending story was re-synthesizing ~45 minutes of
        # narration from scratch, even when nothing about the script or
        # voice had changed (root cause of "audio kokoro sudah 5 kali
        # ngulang" 2026-07-05, from same-day thumbnail/git/speed-fix
        # iterations that each needed a fresh dry run of story #2). Cache
        # keyed on story id + a hash of all committed scripts, so it's
        # invalidated automatically if the target script changes.
        uses: actions/cache@v4
        with:
          path: output/audio
          key: audio-story-${{ steps.nextstory.outputs.id }}-${{ hashFiles('output/scripts/*.txt') }}

      - name: Restore YouTube credentials
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d > youtube_client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # RealDadRevenge-cadence experiment (2026-07-14), see
          # project_golden_child_thumbnail_baseline.md to revert.
          THUMBNAIL_EXPERIMENT: "true"
        run: python3 scheduler.py ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Build 60s video preview for inspection
        if: always()
        run: |
          mp4=$(ls output/video/*.mp4 2>/dev/null | head -1)
          [ -n "$mp4" ] && ffmpeg -y -i "$mp4" -t 60 -c copy output/video/preview_60s.mp4 || true

      - name: Upload inspection artifacts (script + thumbnail + preview)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspect-${{ github.run_number }}
          path: |
            output/scripts/*.txt
            output/thumbs/*.jpg
            output/video/preview_60s.mp4
            output/metadata/*.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit story queue state back
        if: always()
        run: |
          # status_manager.py owns status.json (pushes it independently after
          # every stage transition); if one of ITS push attempts failed, it can
          # leave a stray local modification to status.json that this step has
          # no business touching. Left alone it silently breaks the commands
          # below (root-caused 2026-07-05, run 28727065821: `git pull --rebase`
          # refused with "You have unstaged changes" because status.json was
          # dirty but wasn't in this step's `git add` list).
          git checkout -- status.json 2>/dev/null || true

          git add stories.json output/scripts output/metadata output/thumbs || true
          git diff --cached --quiet && exit 0
          git commit -m "pipeline: update story state [skip ci]"

          # status_manager.py pushes to main throughout the run, so origin
          # keeps moving under us, so a plain `git pull --rebase` here conflicts
          # (root-caused 2026-07-05, run 28714486587: "could not apply ...
          # update story state"). Rebuild this commit on top of the latest
          # origin tip instead, the same fetch+reset pattern status_manager.py
          # already uses successfully, no rebase history left to conflict.
          for attempt in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (attempt $attempt/5), rebuilding on latest origin..."
            git fetch origin main --quiet
            git reset --mixed origin/main --quiet
            git checkout -- status.json 2>/dev/null || true
            git add stories.json output/scripts output/metadata output/thumbs || true
            git diff --cached --quiet && exit 0
            git commit -m "pipeline: update story state [skip ci]"
          done
          echo "::warning::Failed to push story state after 5 attempts"
